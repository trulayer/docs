    delete:
      operationId: deleteWebhook
      tags: [webhooks]
      summary: Delete a webhook (owner or operator)
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: string, format: uuid }
      responses:
        "204":
          description: Webhook deleted
        "404":
          $ref: "#/components/responses/NotFound"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"

  /v1/apikeys/{id}:
    delete:
      operationId: revokeAPIKey
      tags: [apikeys]
      summary: Revoke an API key (owner only; requires Clerk auth)
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: string, format: uuid }
      responses:
        "204":
          description: Revoked
        "404":
          $ref: "#/components/responses/NotFound"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"

  /v1/anomalies:
    get:
      operationId: listAnomalies
      tags: [anomaly]
      summary: List detected anomalies for the tenant
      parameters:
        - name: limit
          in: query
          schema: { type: integer, default: 50, minimum: 1, maximum: 100 }
        - name: offset
          in: query
          schema: { type: integer, default: 0, minimum: 0 }
      responses:
        "200":
          description: Anomaly list
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AnomalyListResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"

  /v1/anomalies/{id}:
    get:
      operationId: getAnomaly
      tags: [anomaly]
      summary: Get a single anomaly by ID
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: string, format: uuid }
      responses:
        "200":
          description: Anomaly detail
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Anomaly"
        "404":
          $ref: "#/components/responses/NotFound"
        "401":
          $ref: "#/components/responses/Unauthorized"

  # ── Eval Runs ──────────────────────────────────────────────────────────────

  /v1/datasets/{id}/versions:
    post:
      operationId: createEvalVersion
      tags: [eval-runs]
      summary: Create an eval version for a dataset
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: string, format: uuid }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateEvalVersionRequest"
      responses:
        "201":
          description: Version created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/EvalVersion"
        "400":
          $ref: "#/components/responses/BadRequest"
        "404":
          $ref: "#/components/responses/NotFound"
    get:
      operationId: listEvalVersions
      tags: [eval-runs]
      summary: List eval versions for a dataset
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: string, format: uuid }
      responses:
        "200":
          description: List of versions
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/EvalVersionListResponse"

  /v1/datasets/{id}/runs:
    post:
      operationId: scheduleEvalRun
      tags: [eval-runs]
      summary: Schedule an eval run against a dataset version
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: string, format: uuid }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ScheduleEvalRunRequest"
      responses:
        "202":
          description: Run scheduled
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/EvalRun"
        "404":
          $ref: "#/components/responses/NotFound"
    get:
      operationId: listEvalRuns
      tags: [eval-runs]
      summary: List eval runs for a dataset
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: string, format: uuid }
        - name: limit
          in: query
          schema: { type: integer, default: 20 }
        - name: offset
          in: query
          schema: { type: integer, default: 0 }
      responses:
        "200":
          description: List of runs
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/EvalRunListResponse"

  /v1/eval-runs/{id}:
    get:
      operationId: getEvalRun
      tags: [eval-runs]
      summary: Get eval run status and progress
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: string, format: uuid }
      responses:
        "200":
          description: Run detail
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/EvalRun"
        "404":
          $ref: "#/components/responses/NotFound"

  /v1/eval-runs/{id}/diff:
    get:
      operationId: getEvalRunDiff
      tags: [eval-runs]
      summary: Score diff between two eval runs
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: string, format: uuid }
        - name: baseline
          in: query
          required: true
          schema: { type: string, format: uuid }
      responses:
        "200":
          description: Diff result
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/EvalRunDiff"
        "400":
          $ref: "#/components/responses/BadRequest"
        "404":
          $ref: "#/components/responses/NotFound"

  # ── CI Gate ────────────────────────────────────────────────────────────────

  /v1/settings/eval-keys:
    get:
      operationId: listEvalKeys
      tags: [eval-keys]
      summary: List active BYOK keys for premium eval models
      description: |
        Returns the active (non-revoked) provider keys for the tenant.
        The raw key material is never returned — only provider and
        creation metadata.
      responses:
        "200":
          description: List of active BYOK keys
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/EvalKeyListResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
    post:
      operationId: upsertEvalKey
      tags: [eval-keys]
      summary: Create or replace the BYOK key for a provider
      description: |
        Stores an encrypted copy of the provider API key. If a key for
        the same provider already exists it is revoked atomically so
        there is never more than one active key per (tenant, provider).
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpsertEvalKeyRequest"
      responses:
        "201":
          description: BYOK key stored
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/EvalKey"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"

  /v1/settings/eval-keys/{provider}:
    delete:
      operationId: revokeEvalKey
      tags: [eval-keys]
      summary: Revoke the BYOK key for a provider
      parameters:
        - name: provider
          in: path
          required: true
          schema:
            type: string
            enum: [openai, anthropic]
      responses:
        "204":
          description: Key revoked
        "400":
          $ref: "#/components/responses/BadRequest"
        "404":
          $ref: "#/components/responses/NotFound"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"

  /v1/settings/billing/checkout:
    post:
      operationId: createBillingCheckout
      tags: [billing]
      summary: Create a Stripe Checkout session for a plan upgrade
      description: |
        Creates a Stripe Checkout session for the specified paid plan.
        Owner-only. Starter is rejected — free plans never require a
        checkout session.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/BillingCheckoutRequest"
      responses:
        "200":
          description: Checkout session URL
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BillingCheckoutResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "500":
          $ref: "#/components/responses/InternalError"

  /v1/settings/billing/portal:
    post:
      operationId: createBillingPortal
      tags: [billing]
      summary: Create a Stripe Billing Portal session
      description: |
        Creates a Stripe Customer Portal session so the owner can manage
        their subscription. Returns 422 if there is no active
        subscription for the tenant.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/BillingPortalRequest"
      responses:
        "200":
          description: Portal session URL
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BillingPortalResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "422":
          $ref: "#/components/responses/UnprocessableEntity"

  /v1/settings/invoices:
    get:
      operationId: listBillingInvoices
      tags: [billing]
      summary: List recent Stripe invoices for the tenant
      description: |
        Returns up to 24 recent Stripe invoices for the authenticated
        tenant's Stripe customer, newest first. Tenants on Starter (no
        Stripe customer yet) receive an empty list rather than a 404.
      responses:
        "200":
          description: Invoice history
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BillingInvoicesResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "500":
          $ref: "#/components/responses/InternalError"

  /v1/ci/gate:
    post:
      operationId: ciGate
      tags: [ci]
      summary: Evaluate an eval run against a CI policy
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CIGateRequest"
      responses:
        "200":
          description: Gate decision
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CIGateResponse"
        "404":
          $ref: "#/components/responses/NotFound"

components:
  securitySchemes:
    BearerAuth:
      type: http
      scheme: bearer
      description: SDK API key (`tl_...`) or Clerk session JWT

  responses:
    BadRequest:
      description: Bad request
      content:
        application/json:
          schema: { $ref: "#/components/schemas/ErrorResponse" }
    Unauthorized:
      description: Missing or invalid credentials
      content:
        application/json:
          schema: { $ref: "#/components/schemas/ErrorResponse" }
    Forbidden:
      description: Insufficient role
      content:
        application/json:
          schema: { $ref: "#/components/schemas/ErrorResponse" }
    NotFound:
      description: Resource not found
      content:
        application/json:
          schema: { $ref: "#/components/schemas/ErrorResponse" }
    RateLimited:
      description: Rate limit exceeded
      content:
        application/json:
          schema: { $ref: "#/components/schemas/ErrorResponse" }
    UnprocessableEntity:
      description: Request understood but cannot be processed in the current state
      content:
        application/json:
          schema: { $ref: "#/components/schemas/ErrorResponse" }
    InternalError:
      description: Internal server error
      content:
        application/json:
          schema: { $ref: "#/components/schemas/ErrorResponse" }

  schemas:
    ErrorResponse:
      type: object
      required: [error]
      properties:
        error: { type: string }

    HealthResponse:
      type: object
      required: [status, time]
      properties:
        status: { type: string, example: ok }
        time: { type: string, format: date-time }

    # ── OTLP / OpenTelemetry (TRU-40) ────────────────────────────────────────────
    # Documented here as loose JSON schemas. The wire format is the official
    # OTLP protobuf — see go.opentelemetry.io/proto/otlp v1.10+ for the
    # authoritative types. GenAI semconv attributes are pinned to v1.29.0.

    OTLPExportTraceServiceRequest:
      type: object
      description: OTLP ExportTraceServiceRequest — passthrough of the OTel protobuf shape.
      properties:
        resourceSpans:
          type: array
          items:
            $ref: "#/components/schemas/OTLPResourceSpans"

    OTLPExportTraceServiceResponse:
      type: object
      properties:
        partialSuccess:
          type: object
          properties:
            rejectedSpans: { type: integer, format: int64 }
            errorMessage: { type: string }

    OTLPTracesData:
      type: object
      properties:
        resourceSpans:
          type: array
          items:
            $ref: "#/components/schemas/OTLPResourceSpans"

    OTLPResourceSpans:
      type: object
      properties:
        resource:
          type: object
          properties:
            attributes:
              type: array
              items: { $ref: "#/components/schemas/OTLPKeyValue" }
        scopeSpans:
          type: array
          items:
            $ref: "#/components/schemas/OTLPScopeSpans"
        schemaUrl: { type: string }

    OTLPScopeSpans:
      type: object
      properties:
        scope:
          type: object
          properties:
            name: { type: string }
            version: { type: string }
        spans:
          type: array
          items:
            $ref: "#/components/schemas/OTLPSpan"
        schemaUrl: { type: string }

    OTLPSpan:
      type: object
      properties:
        traceId: { type: string, description: 128-bit trace id, base64 or hex per OTel transport }
        spanId: { type: string, description: 64-bit span id, base64 or hex per OTel transport }
        parentSpanId: { type: string }
        name: { type: string }
        startTimeUnixNano: { type: string, format: int64 }
        endTimeUnixNano: { type: string, format: int64 }
        attributes:
          type: array
          items: { $ref: "#/components/schemas/OTLPKeyValue" }

    OTLPKeyValue:
      type: object
      properties:
        key: { type: string }
        value:
          type: object
          description: OTel AnyValue — one of stringValue, intValue, boolValue, doubleValue, arrayValue, kvlistValue, bytesValue.
          additionalProperties: true

    # ── Ingestion ────────────────────────────────────────────────────────────────

    SpanRequest:
      type: object
      required: [name, type]
      properties:
        id: { type: string }
        parent_span_id: { type: string, nullable: true }
        name: { type: string }
        type:
          type: string
          enum: [llm, tool, retrieval, other]
        input: { type: string, nullable: true }
        output: { type: string, nullable: true }
        model: { type: string, nullable: true }
        latency_ms: { type: integer, nullable: true }
        cost: { type: number, nullable: true }
        error: { type: string, nullable: true }
        metadata: { type: object, additionalProperties: true }
        start_time: { type: string, format: date-time, nullable: true }
        end_time: { type: string, format: date-time, nullable: true }

    EventRequest:
      type: object
      required: [message]
      properties:
        id: { type: string }
        span_id: { type: string, nullable: true }
        level:
          type: string
          enum: [info, warn, error]
          default: info
        message: { type: string }
        metadata: { type: object, additionalProperties: true }

    TraceRequest:
      type: object
      properties:
        id: { type: string }
        external_id: { type: string, nullable: true }
        name: { type: string, nullable: true }
        input: { type: string, nullable: true }
        output: { type: string, nullable: true }
        model: { type: string, nullable: true }
        latency_ms: { type: integer, nullable: true }
        cost: { type: number, nullable: true }
        error: { type: string, nullable: true }
        metadata: { type: object, additionalProperties: true }
        spans:
          type: array
          items: { $ref: "#/components/schemas/SpanRequest" }
        events:
          type: array
          items: { $ref: "#/components/schemas/EventRequest" }

    BatchRequest:
      type: object
      required: [traces]
      properties:
        traces:
          type: array
          minItems: 1
          maxItems: 100
          items: { $ref: "#/components/schemas/TraceRequest" }

    IngestResponse:
      type: object
      required: [id, created_at]
      properties:
        id: { type: string, format: uuid }
        created_at: { type: string, format: date-time }

    DuplicateResponse:
      type: object
      required: [status]
      properties:
        status: { type: string, example: duplicate }

    BatchIngestResponse:
      type: object
      required: [ingested, ids]
      properties:
        ingested: { type: integer }
        ids:
          type: array
          items: { type: string, format: uuid }

    # ── Traces ───────────────────────────────────────────────────────────────────

    Span:
      type: object
      required: [id, trace_id, name, span_type, error, started_at]
      properties:
        id: { type: string, format: uuid }
        trace_id: { type: string, format: uuid }
        name: { type: string }
        span_type: { type: string, enum: [llm, tool, retrieval, other, default] }
        input: { type: string, nullable: true }
        output: { type: string, nullable: true }
        error: { type: boolean }
        error_message: { type: string, nullable: true }
        latency_ms: { type: integer, nullable: true }
        model: { type: string, nullable: true }
        prompt_tokens: { type: integer, nullable: true }
        completion_tokens: { type: integer, nullable: true }
        metadata: { type: object, additionalProperties: true }
        started_at: { type: string, format: date-time }
        ended_at: { type: string, format: date-time, nullable: true }

    Trace:
      type: object
      required: [id, project_id, error, tags, started_at]
      properties:
        id: { type: string, format: uuid }
        project_id: { type: string, format: uuid }
        session_id: { type: string, nullable: true }
        external_id: { type: string, nullable: true }
        name: { type: string, nullable: true }
        input: { type: string, nullable: true }
        output: { type: string, nullable: true }
        model: { type: string, nullable: true }
        latency_ms: { type: integer, nullable: true }
        cost: { type: number, nullable: true }
        error: { type: boolean }
        tags: { type: array, items: { type: string } }
        metadata: { type: object, additionalProperties: true }
        span_count: { type: integer }
        spans:
          type: array
          items: { $ref: "#/components/schemas/Span" }
        started_at: { type: string, format: date-time }
        ended_at: { type: string, format: date-time, nullable: true }

    TraceListResponse:
      type: object
      required: [traces, has_more]
      properties:
        traces:
          type: array
          items: { $ref: "#/components/schemas/Trace" }
        next_cursor: { type: string, nullable: true }
        has_more: { type: boolean }

    # ── Deprecations ─────────────────────────────────────────────────────────────

    Deprecation:
      type: object
      required: [field, endpoint, sunset_date]
      description: |
        One currently-deprecated v1 field or endpoint. `field` is the
        JSON-path-style name within the response body (e.g. `trace_id`,
        `metadata.project`); for whole-endpoint deprecations use `field: ""`.
        `endpoint` is the path template (e.g. `/v1/traces/{id}`).
        `sunset_date` is the ISO-8601 date on or after which the field or
        endpoint will be removed — matches the `Sunset` response header.
      properties:
        field: { type: string }
        endpoint: { type: string }
        sunset_date: { type: string, format: date }

    # ── Metrics ──────────────────────────────────────────────────────────────────

    MetricsResponse:
      type: object
      required: [total_traces, error_count, from, to]
      properties:
        total_traces: { type: integer }
        error_count: { type: integer }
        error_rate: { type: number, nullable: true, description: "Fraction 0–1; null when total_traces=0" }
        p50_latency_ms: { type: number, nullable: true }
        p95_latency_ms: { type: number, nullable: true }
        p99_latency_ms: { type: number, nullable: true }
        total_cost: { type: number, nullable: true }
        from: { type: string, format: date-time }
        to: { type: string, format: date-time }

    # ── Ingestion health (TRU-167) ───────────────────────────────────────────────

    IngestionHealthTopError:
      type: object
      required: [category, count]
      properties:
        category: { type: string, description: "Coarse error category (first 64 chars of the error text)" }
        count: { type: integer, format: int64 }

    IngestionHealthDLQDepth:
      type: object
      required: [traces, evals]
      properties:
        traces: { type: integer, format: int64 }
        evals: { type: integer, format: int64 }

    IngestionHealthLag:
      type: object
      required: [p50, p95, p99]
      properties:
        p50: { type: integer, format: int64 }
        p95: { type: integer, format: int64 }
        p99: { type: integer, format: int64 }

    AuditVerifyResponse:
      type: object
      required:
        - verified
        - date
        - head_hash
        - row_count
        - s3_key
        - anchored_at
      properties:
        verified:
          type: boolean
          description: "True when an anchor row exists for the given (tenant_id, date)."
        date:
          type: string
          format: date
        head_hash:
          type: string
          description: "Hex-encoded sha256 of the audit-log chain head as of the anchor date."
        row_count:
          type: integer
          format: int64
        s3_key:
          type: string
          description: "Object key of the signed manifest in the anchor S3 bucket."
        anchored_at:
          type: string
          format: date-time
        hash_matches:
          type: boolean
          nullable: true
          description: "Present only when the caller provided `expected_head_hash`."

    Subprocessor:
      type: object
      required:
        - id
        - vendor
        - purpose
        - region
        - effective_at
      properties:
        id:
          type: string
          format: uuid
        vendor:
          type: string
        purpose:
          type: string
        region:
          type: string
        dpa_url:
          type: string
          nullable: true
        effective_at:
          type: string
          format: date-time
        retired_at:
          type: string
          format: date-time
          nullable: true

    SubprocessorList:
      type: object
      required:
        - subprocessors
        - updated_at
      properties:
        subprocessors:
          type: array
          items:
            $ref: "#/components/schemas/Subprocessor"
        updated_at:
          type: string
          format: date-time

    SubscribeRequest:
      type: object
      required:
        - email
      properties:
        email:
          type: string
          format: email

    SubprocessorSubscribeResponse:
      type: object
      required:
        - status
      properties:
        status:
          type: string
          enum: [subscribed, unsubscribed]

    CreateDsrRequest:
      type: object
      required:
        - subject_id
        - type
      properties:
        subject_id:
          type: string
          description: Opaque identifier for the data subject in the customer's namespace.
        type:
          type: string
          enum: [delete, export]
          description: |
            `delete` triggers erasure (GDPR Art. 17 / CCPA right to delete);
            `export` triggers data export (GDPR Art. 15 / CCPA right to know).

    DsrRequest:
      type: object
      required:
        - id
        - created_at
        - updated_at
        - tenant_id
        - requested_by
        - subject_id
        - type
        - status
      properties:
        id:
          type: string
          format: uuid
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time
        tenant_id:
          type: string
          format: uuid
        requested_by:
          type: string
          description: Clerk user ID of the dashboard user who submitted the request.
        subject_id:
          type: string
        type:
          type: string
          enum: [delete, export]
        status:
          type: string
          enum: [pending, processing, completed, failed]
        completed_at:
          type: string
          format: date-time
          nullable: true
        export_url:
          type: string
          nullable: true
          description: Signed URL pointing at the export artefact. Set only for completed `export` requests.
        error_msg:
          type: string
          nullable: true
          description: Terse failure description. Set only when `status = failed`.

    DsrRequestList:
      type: object
      required:
        - items
        - requests
      properties:
        items:
          type: array
          deprecated: true
          description: |
            Legacy alias for `requests`. Present for v1 back-compatibility only.
            New integrations should read `requests`. This field will be removed
            after the 12-month deprecation window closes (see `/v1/deprecations`).
          items:
            $ref: "#/components/schemas/DsrRequest"
        requests:
          type: array
          description: The page of DSR rows for this tenant. Canonical key — prefer over `items`.
          items:
            $ref: "#/components/schemas/DsrRequest"
        next_cursor:
          type: string
          description: Opaque cursor for the next page; omitted when there are no further rows.

    Policy:
      type: object
      required:
        - id
        - created_at
        - updated_at
        - tenant_id
        - name
        - description
        - status
        - rule_yaml
        - trigger_type
        - action_type
        - rollout_pct
        - dry_run
        - created_by
      properties:
        id:
          type: string
          format: uuid
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time
        tenant_id:
          type: string
          format: uuid
        name:
          type: string
        description:
          type: string
        status:
          type: string
          enum: [draft, active, paused, archived]
        rule_yaml:
          type: string
          description: Raw YAML DSL as authored. Opaque to the server in Phase 1.
        trigger_type:
          type: string
          enum: [eval_score, anomaly, failure_rate]
          description: Denormalised summary of the `when:` clause for fast filtering.
        action_type:
          type: string
          enum: [retry, fallback_model, route_pct, block, escalate]
          description: Denormalised summary of the `then:` clause for fast filtering.
        rollout_pct:
          type: integer
          minimum: 0
          maximum: 100
          description: Staged-rollout percentage. 0 means the policy is authored but inactive.
        dry_run:
          type: boolean
          description: When true, the evaluator records observations without applying the action.
        created_by:
          type: string
          description: Clerk user ID of the author.

    CreatePolicyRequest:
      type: object
      required:
        - name
        - rule_yaml
        - trigger_type
        - action_type
      properties:
        name:
          type: string
        description:
          type: string
        rule_yaml:
          type: string
        trigger_type:
          type: string
          enum: [eval_score, anomaly, failure_rate]
        action_type:
          type: string
          enum: [retry, fallback_model, route_pct, block, escalate]
        rollout_pct:
          type: integer
          minimum: 0
          maximum: 100
          default: 0
        dry_run:
          type: boolean
          default: true

    UpdatePolicyRequest:
      type: object
      description: PATCH body — all fields optional; only supplied fields are changed.
      properties:
        name:
          type: string
        description:
          type: string
        rule_yaml:
          type: string
        trigger_type:
          type: string
          enum: [eval_score, anomaly, failure_rate]
        action_type:
          type: string
          enum: [retry, fallback_model, route_pct, block, escalate]
        rollout_pct:
          type: integer
          minimum: 0
          maximum: 100
        dry_run:
          type: boolean
        status:
          type: string
          enum: [draft, active, paused, archived]

    PolicyListResponse:
      type: object
      required:
        - items
        - total
        - limit
        - offset
      properties:
        items:
          type: array
          items:
            $ref: "#/components/schemas/Policy"
        total:
          type: integer
          format: int64
        limit:
          type: integer
        offset:
          type: integer

    IngestionHealthResponse:
      type: object
      required:
        - window
        - success_rate
        - error_rate
        - top_errors
        - dlq_depth
        - ingest_lag_ms
        - redaction_match_count
      properties:
        project_id:
          type: string
          format: uuid
          nullable: true
          description: "Echoes the `project_id` query param when set; omitted for tenant-wide reports."
        window:
          type: string
          enum: [1h, 24h, 7d]
        success_rate:
          type: number
          description: "Fraction 0–1 of traces without an error. 1.0 when no traffic in the window."
        error_rate:
          type: number
          description: "Fraction 0–1 of traces with a non-empty error."
        top_errors:
          type: array
          items: { $ref: "#/components/schemas/IngestionHealthTopError" }
        dlq_depth: { $ref: "#/components/schemas/IngestionHealthDLQDepth" }
        ingest_lag_ms: { $ref: "#/components/schemas/IngestionHealthLag" }
        last_successful_span_at:
          type: string
          format: date-time
          nullable: true
        redaction_match_count:
          type: integer
          format: int64
          description: "Zero until redaction instrumentation lands."

    # ── Feedback ─────────────────────────────────────────────────────────────────

    FeedbackRequest:
      type: object
      required: [trace_id, label]
      properties:
        trace_id: { type: string, format: uuid }
        label: { type: string, enum: [good, bad, neutral] }
        score: { type: number, nullable: true }
        comment: { type: string, nullable: true }
        metadata: { type: object, additionalProperties: true }

    # ── Evals ────────────────────────────────────────────────────────────────────

    EvalTriggerRequest:
      type: object
      required: [trace_id, evaluator_type, metric_name]
      properties:
        trace_id: { type: string, format: uuid }
        evaluator_type: { type: string, enum: [llm, rule] }
        metric_name: { type: string }

    EvalTriggerResponse:
      type: object
      required: [eval_id, status]
      properties:
        eval_id: { type: string, format: uuid }
        status: { type: string, enum: [pending, running, complete, failed] }

    Evaluation:
      type: object
      required: [id, trace_id, project_id, metric_name, evaluator_type, status]
      properties:
        id: { type: string, format: uuid }
        trace_id: { type: string, format: uuid }
        project_id: { type: string, format: uuid }
        metric_name: { type: string }
        evaluator_type: { type: string, enum: [llm, rule] }
        status: { type: string, enum: [pending, running, complete, failed] }
        score: { type: number, nullable: true }
        label: { type: string, nullable: true }
        reasoning: { type: string, nullable: true }

    EvalListResponse:
      type: object
      required: [evals]
      properties:
        evals:
          type: array
          items: { $ref: "#/components/schemas/Evaluation" }

    # ── Eval Analytics ───────────────────────────────────────────────────────────

    EvalTrendBucket:
      type: object
      required: [time, metric, avg_score, count, pass_rate]
      properties:
        time: { type: string, format: date-time }
        metric: { type: string }
        avg_score: { type: number }
        count: { type: integer }
        pass_rate: { type: number, description: "Fraction 0-1 of evals with score >= 0.5" }

    EvalTrendsResponse:
      type: object
      required: [buckets]
      properties:
        buckets:
          type: array
          items: { $ref: "#/components/schemas/EvalTrendBucket" }

    EvalHistogramBucket:
      type: object
      required: [range_start, range_end, count]
      properties:
        range_start: { type: number }
        range_end: { type: number }
        count: { type: integer }

    EvalHistogramResponse:
      type: object
      required: [metric, buckets]
      properties:
        metric: { type: string }
        buckets:
          type: array
          items: { $ref: "#/components/schemas/EvalHistogramBucket" }

    EvalCompareWindow:
      type: object
      required: [avg_score, count, pass_rate]
      properties:
        avg_score: { type: number }
        count: { type: integer }
        pass_rate: { type: number }

    EvalCompareDelta:
      type: object
      required: [avg_score, pass_rate]
      properties:
        avg_score: { type: number }
        pass_rate: { type: number }

    EvalCompareResponse:
      type: object
      required: [metric, baseline, candidate, delta]
      properties:
        metric: { type: string }
        baseline: { $ref: "#/components/schemas/EvalCompareWindow" }
        candidate: { $ref: "#/components/schemas/EvalCompareWindow" }
        delta: { $ref: "#/components/schemas/EvalCompareDelta" }

    # ── Eval Rules ───────────────────────────────────────────────────────────────

    EvalRule:
      type: object
      required: [id, tenant_id, project_id, metric_name, evaluator_type, enabled, model_tier, created_at, updated_at]
      properties:
        id: { type: string, format: uuid }
        tenant_id: { type: string, format: uuid }
        project_id: { type: string, format: uuid }
        metric_name: { type: string }
        evaluator_type:
          type: string
          enum: [llm, rule]
        config: { type: object, additionalProperties: true, nullable: true }
        enabled: { type: boolean }
        model_tier:
          type: string
          enum: [cheap, premium]
          default: cheap
        created_at: { type: string, format: date-time }
        updated_at: { type: string, format: date-time }

    EvalRuleListResponse:
      type: object
      required: [items]
      properties:
        items:
          type: array
          items: { $ref: "#/components/schemas/EvalRule" }

    EvalCatalogEntry:
      type: object
      required: [name, description, tags, cost_tier, example_input, example_output]
      properties:
        name:
          type: string
          description: Stable identifier used as `config.preset` when triggering an eval.
        description: { type: string }
        tags:
          type: array
          items: { type: string }
          description: One or more of quality, safety, retrieval, tool-use.
        cost_tier:
          type: string
          enum: [low, medium, high]
        example_input: { type: string }
        example_output: { type: string }

    EvalCatalogResponse:
      type: object
      required: [evaluators]
      properties:
        evaluators:
          type: array
          items: { $ref: "#/components/schemas/EvalCatalogEntry" }

    CreateEvalRuleRequest:
      type: object
      required: [project_id, metric_name, evaluator_type]
      properties:
        project_id: { type: string, format: uuid }
        metric_name: { type: string }
        evaluator_type:
          type: string
          enum: [llm, rule]
        config: { type: object, additionalProperties: true, nullable: true }
        enabled: { type: boolean, default: true }
        model_tier:
          type: string
          enum: [cheap, premium]
          default: cheap

    UpdateEvalRuleRequest:
      type: object
      properties:
        enabled: { type: boolean, nullable: true }
        metric_name: { type: string, nullable: true }
        config: { type: object, additionalProperties: true, nullable: true }
        model_tier:
          type: string
          enum: [cheap, premium]
          nullable: true

    # ── Eval Keys (BYOK) ─────────────────────────────────────────────────────────

    EvalKey:
      type: object
      required: [id, provider, created_at]
      properties:
        id: { type: string, format: uuid }
        provider:
          type: string
          enum: [openai, anthropic]
        created_at: { type: string, format: date-time }

    EvalKeyListResponse:
      type: object
      required: [items]
      properties:
        items:
          type: array
          items: { $ref: "#/components/schemas/EvalKey" }

    UpsertEvalKeyRequest:
      type: object
      required: [provider, key]
      properties:
        provider:
          type: string
          enum: [openai, anthropic]
        key:
          type: string
          description: Raw provider API key. Stored AES-256-GCM encrypted; never returned.

    # ── Failure Rules ────────────────────────────────────────────────────────────

    FailureRule:
      type: object
      required: [id, tenant_id, name, metric, operator, threshold, window_secs, severity, enabled, created_at, updated_at]
      properties:
        id: { type: string, format: uuid }
        tenant_id: { type: string, format: uuid }
        name: { type: string }
        metric:
          type: string
          enum: [error_rate, latency_p99, latency_p95, score]
        operator:
          type: string
          enum: [gt, gte, lt, lte]
        threshold: { type: number }
        window_secs: { type: integer, default: 300 }
        severity:
          type: string
          enum: [low, medium, high, critical]
          default: medium
        enabled: { type: boolean, default: true }
        created_at: { type: string, format: date-time }
        updated_at: { type: string, format: date-time }

    FailureRuleListResponse:
      type: object
      required: [items]
      properties:
        items:
          type: array
          items: { $ref: "#/components/schemas/FailureRule" }

    CreateFailureRuleRequest:
      type: object
      required: [name, metric, operator, threshold]
      properties:
        name: { type: string }
        metric:
          type: string
          enum: [error_rate, latency_p99, latency_p95, score]
        operator:
          type: string
          enum: [gt, gte, lt, lte]
        threshold: { type: number }
        window_secs: { type: integer, default: 300 }
        severity:
          type: string
          enum: [low, medium, high, critical]
          default: medium
        enabled: { type: boolean, default: true }

    UpdateFailureRuleRequest:
      type: object
      properties:
        name: { type: string, nullable: true }
        metric:
          type: string
          enum: [error_rate, latency_p99, latency_p95, score]
          nullable: true
        operator:
          type: string
          enum: [gt, gte, lt, lte]
          nullable: true
        threshold: { type: number, nullable: true }
        window_secs: { type: integer, nullable: true }
        severity:
          type: string
          enum: [low, medium, high, critical]
          nullable: true
        enabled: { type: boolean, nullable: true }

    # ── Live Trace Events ────────────────────────────────────────────────────────

    LiveTraceEvent:
      type: object
      required: [trace_id, name, status, latency_ms, created_at]
      properties:
        trace_id: { type: string, format: uuid }
        name: { type: string }
        status:
          type: string
          enum: [ok, error]
        latency_ms: { type: integer }
        created_at: { type: string, format: date-time }

    # ── API Keys ─────────────────────────────────────────────────────────────────

    CreateAPIKeyRequest:
      type: object
      required: [name]
      properties:
        name: { type: string, description: Human-readable label for the key }

    CreateAPIKeyResponse:
      type: object
      required: [id, key, prefix, name, created_at]
      properties:
        id: { type: string, format: uuid }
        key: { type: string, description: "Full plaintext key — shown once only" }
        prefix: { type: string }
        name: { type: string }
        created_at: { type: string, format: date-time }

    APIKey:
      type: object
      required: [id, prefix, name, created_at]
      properties:
        id: { type: string, format: uuid }
        prefix: { type: string }
        name: { type: string }
        created_at: { type: string, format: date-time }
        last_used_at: { type: string, format: date-time, nullable: true }
        revoked_at: { type: string, format: date-time, nullable: true }
        created_by_email: { type: string, nullable: true }
        created_by_first_name: { type: string, nullable: true }
        created_by_last_name: { type: string, nullable: true }

    # ── Datasets ────────────────────────────────────────────────────────────────

    CreateDatasetRequest:
      type: object
      required: [name]
      properties:
        name: { type: string }
        description: { type: string, nullable: true }

    Project:
      type: object
      required: [id, organization_id, name, slug, created_at, updated_at]
      properties:
        id: { type: string, format: uuid }
        organization_id: { type: string, format: uuid }
        name: { type: string }
        slug: { type: string }
        archived_at: { type: string, format: date-time, nullable: true }
        retention_days_override:
          type: integer
          nullable: true
          minimum: 1
          description: |
            Per-project retention override. When `null`, retention follows
            the plan default; when set, must be between 1 and the plan's
            retention cap (unbounded on Enterprise).
        created_at: { type: string, format: date-time }
        updated_at: { type: string, format: date-time }

    PatchProjectRequest:
      type: object
      description: |
        Partial update payload for PATCH /v1/projects/{id}. Omit a field to
        leave it unchanged. Supply `retention_days_override: null` to clear
        the override back to the plan default.
      properties:
        name:
          type: string
          minLength: 1
          maxLength: 100
        retention_days_override:
          type: integer
          nullable: true
          minimum: 1
          description: |
            Per-project retention window in days. Must be between 1 and the
            caller's plan retention cap. Pass `null` to clear.

    ProjectListResponse:
      type: object
      required: [projects]
      properties:
        projects:
          type: array
          items: { $ref: "#/components/schemas/Project" }
        next_cursor: { type: string, nullable: true }
        has_more: { type: boolean }

    Dataset:
      type: object
      required: [id, tenant_id, name, created_at, updated_at]
      properties:
        id: { type: string, format: uuid }
        tenant_id: { type: string, format: uuid }
        name: { type: string }
        description: { type: string, nullable: true }
        created_at: { type: string, format: date-time }
        updated_at: { type: string, format: date-time }

    DatasetListResponse:
      type: object
      required: [datasets]
      properties:
        datasets:
          type: array
          items: { $ref: "#/components/schemas/Dataset" }

    DatasetItemListResponse:
      type: object
      required: [items, has_more]
      properties:
        items:
          type: array
          items: { $ref: "#/components/schemas/DatasetItem" }
        next_cursor: { type: string, nullable: true }
        has_more: { type: boolean }

    AddDatasetItemRequest:
      type: object
      required: [trace_id]
      properties:
        trace_id: { type: string, format: uuid }
        span_id: { type: string, format: uuid, nullable: true }
        feedback_id: { type: string, format: uuid, nullable: true }
        label: { type: string, nullable: true }

    DatasetItem:
      type: object
      required: [id, dataset_id, tenant_id, trace_id, created_at, updated_at]
      properties:
        id: { type: string, format: uuid }
        dataset_id: { type: string, format: uuid }
        tenant_id: { type: string, format: uuid }
        trace_id: { type: string, format: uuid }
        span_id: { type: string, format: uuid, nullable: true }
        feedback_id: { type: string, format: uuid, nullable: true }
        label:
          type: string
          nullable: true
          enum: [pass, fail, unlabeled, null]
          description: |
            Review label for the item. `null` (or omitted) means the item has
            not been labeled yet. The frontend toggles this value via
            `PATCH /v1/datasets/{id}/items/{itemId}`.
        created_at: { type: string, format: date-time }
        updated_at: { type: string, format: date-time }

    PatchDatasetItemRequest:
      type: object
      description: |
        Mutation body for `PATCH /v1/datasets/{id}/items/{itemId}`. Only the
        `label` field is accepted. Pass `null` or omit the field to clear the
        label back to unlabeled.
      properties:
        label:
          type: string
          nullable: true
          enum: [pass, fail, unlabeled, null]

    # ── Control Actions ────��────────────────────────────────────────────────────

    ExecuteControlActionRequest:
      type: object
      required: [project_id, action_type]
      properties:
        project_id: { type: string, format: uuid }
        trace_id: { type: string, format: uuid, nullable: true }
        rule_id: { type: string, format: uuid, nullable: true }
        action_type:
          type: string
          enum: [retry, fallback_model, prompt_modification, agent_action]
        payload: { type: object, additionalProperties: true, nullable: true }

    ControlAction:
      type: object
      required: [id, tenant_id, project_id, action_type, status, created_at, updated_at]
      properties:
        id: { type: string, format: uuid }
        tenant_id: { type: string, format: uuid }
        project_id: { type: string, format: uuid }
        trace_id: { type: string, format: uuid, nullable: true }
        rule_id: { type: string, format: uuid, nullable: true }
        action_type:
          type: string
          enum: [retry, fallback_model, prompt_modification, agent_action]
        status:
          type: string
          enum: [pending, executed, failed]
        payload: { type: object, additionalProperties: true, nullable: true }
        result: { type: object, additionalProperties: true, nullable: true }
        executed_at: { type: string, format: date-time, nullable: true }
        created_at: { type: string, format: date-time }
        updated_at: { type: string, format: date-time }

    ControlActionListResponse:
      type: object
      required: [actions, has_more]
      properties:
        actions:
          type: array
          items: { $ref: "#/components/schemas/ControlAction" }
        next_cursor: { type: string, nullable: true }
        has_more: { type: boolean }

    # ── Model Routes ────────────────────────────────────────────────���─────────

    ModelRouteCondition:
      type: object
      required: [type]
      properties:
        type:
          type: string
          enum: [latency_threshold, error_rate, cost_threshold, always]
        threshold: { type: number, nullable: true }
        window_minutes: { type: integer, nullable: true }

    ModelRouteAction:
      type: object
      required: [type]
      properties:
        type:
          type: string
          enum: [fallback_model, block, log_only]
        model: { type: string, nullable: true }

    ModelRoute:
      type: object
      required: [id, tenant_id, name, condition, action, priority, enabled, created_at, updated_at]
      properties:
        id: { type: string, format: uuid }
        tenant_id: { type: string, format: uuid }
        name: { type: string }
        description: { type: string, nullable: true }
        condition: { $ref: "#/components/schemas/ModelRouteCondition" }
        action: { $ref: "#/components/schemas/ModelRouteAction" }
        priority: { type: integer }
        enabled: { type: boolean }
        created_at: { type: string, format: date-time }
        updated_at: { type: string, format: date-time }

    ModelRouteListResponse:
      type: object
      required: [items, has_more]
      properties:
        items:
          type: array
          items: { $ref: "#/components/schemas/ModelRoute" }
        next_cursor: { type: string, nullable: true }
        has_more: { type: boolean }

    CreateModelRouteRequest:
      type: object
      required: [name, condition, action]
      properties:
        name: { type: string }
        description: { type: string, nullable: true }
        condition: { $ref: "#/components/schemas/ModelRouteCondition" }
        action: { $ref: "#/components/schemas/ModelRouteAction" }
        priority: { type: integer, default: 100 }
        enabled: { type: boolean, default: true }

    UpdateModelRouteRequest:
      type: object
      properties:
        name: { type: string, nullable: true }
        description: { type: string, nullable: true }
        condition: { $ref: "#/components/schemas/ModelRouteCondition" }
        action: { $ref: "#/components/schemas/ModelRouteAction" }
        priority: { type: integer, nullable: true }
        enabled: { type: boolean, nullable: true }

    # ── Search ──────────────────────────────────────────────────────────────────

    SpanSearchRequest:
      type: object
      required: [query_vector, project_id]
      properties:
        query_vector:
          type: array
          items: { type: number, format: float }
          description: "Float32 array, 1536 dimensions (OpenAI ada-002)"
        project_id: { type: string, format: uuid }
        limit: { type: integer, default: 10, minimum: 1, maximum: 100 }
        threshold: { type: number, default: 0.7, minimum: 0, maximum: 1, description: "Cosine similarity threshold" }

    SpanSearchResult:
      type: object
      required: [span_id, trace_id, similarity, span_name, span_type, created_at]
      properties:
        span_id: { type: string, format: uuid }
        trace_id: { type: string, format: uuid }
        similarity: { type: number }
        span_name: { type: string }
        span_type: { type: string }
        created_at: { type: string, format: date-time }

    SpanSearchResponse:
      type: object
      required: [results]
      properties:
        results:
          type: array
          items: { $ref: "#/components/schemas/SpanSearchResult" }

    SpanTextSearchResponse:
      type: object
      required: [results]
      properties:
        results:
          type: array
          items: { $ref: "#/components/schemas/SpanSearchResult" }
        next_cursor:
          type: string
          description: Opaque cursor for the next page, omitted on the last page.

    # ── Webhooks ────────────────────────────────────────────────────────────────

    Webhook:
      type: object
      required: [id, tenant_id, url, events, enabled, created_at, updated_at]
      properties:
        id: { type: string, format: uuid }
        tenant_id: { type: string, format: uuid }
        url: { type: string, format: uri }
        events:
          type: array
          items: { type: string }
        enabled: { type: boolean }
        created_at: { type: string, format: date-time }
        updated_at: { type: string, format: date-time }

    CreateWebhookRequest:
      type: object
      required: [url, secret]
      properties:
        url: { type: string, format: uri }
        secret: { type: string, minLength: 16, description: "HMAC secret for signature verification" }
        events:
          type: array
          items: { type: string }
          default: ["failure.detected"]
        enabled: { type: boolean, default: true }

    WebhookListResponse:
      type: object
      required: [webhooks]
      properties:
        webhooks:
          type: array
          items: { $ref: "#/components/schemas/Webhook" }

    # ── Anomalies ──────────────────────────────────────────────────────────────

    Anomaly:
      type: object
      required: [id, tenant_id, type, severity, description, detected_at]
      properties:
        id: { type: string, format: uuid }
        tenant_id: { type: string, format: uuid }
        type:
          type: string
          enum: [latency_spike, error_rate_spike, volume_anomaly]
        severity:
          type: string
          enum: [low, medium, high, critical]
        description: { type: string }
        trace_id: { type: string, format: uuid, nullable: true }
        detected_at: { type: string, format: date-time }
        metadata: { type: object, additionalProperties: true, nullable: true }
        created_at: { type: string, format: date-time }

    AnomalyListResponse:
      type: object
      required: [anomalies]
      properties:
        anomalies:
          type: array
          items: { $ref: "#/components/schemas/Anomaly" }

    # ── Eval Runs ──────────────────────────────────────────────────────────────

    EvalVersion:
      type: object
      required: [id, tenant_id, dataset_id, name, created_at]
      properties:
        id: { type: string, format: uuid }
        tenant_id: { type: string, format: uuid }
        dataset_id: { type: string, format: uuid }
        name: { type: string }
        system_prompt: { type: string, nullable: true }
        model: { type: string, nullable: true }
        judge_model: { type: string, nullable: true }
        metadata: { type: object, additionalProperties: true, nullable: true }
        created_at: { type: string, format: date-time }

    CreateEvalVersionRequest:
      type: object
      required: [name]
      properties:
        name: { type: string }
        system_prompt: { type: string }
        model: { type: string }
        judge_model: { type: string }

    EvalVersionListResponse:
      type: object
      required: [versions]
      properties:
        versions:
          type: array
          items: { $ref: "#/components/schemas/EvalVersion" }

    EvalRun:
      type: object
      required: [id, tenant_id, dataset_id, eval_version_id, status, item_count, completed_count, created_at]
      properties:
        id: { type: string, format: uuid }
        tenant_id: { type: string, format: uuid }
        dataset_id: { type: string, format: uuid }
        eval_version_id: { type: string, format: uuid }
        status:
          type: string
          enum: [pending, running, completed, failed]
        item_count: { type: integer }
        completed_count: { type: integer }
        started_at: { type: string, format: date-time, nullable: true }
        completed_at: { type: string, format: date-time, nullable: true }
        error_message: { type: string, nullable: true }
        created_at: { type: string, format: date-time }

    ScheduleEvalRunRequest:
      type: object
      required: [eval_version_id]
      properties:
        eval_version_id: { type: string, format: uuid }

    EvalRunListResponse:
      type: object
      required: [runs]
      properties:
        runs:
          type: array
          items: { $ref: "#/components/schemas/EvalRun" }

    EvalRunDiff:
      type: object
      required: [run_id, baseline_id, summary, items]
      properties:
        run_id: { type: string, format: uuid }
        baseline_id: { type: string, format: uuid }
        summary:
          $ref: "#/components/schemas/DiffSummary"
        items:
          type: array
          items: { $ref: "#/components/schemas/DiffItem" }

    DiffSummary:
      type: object
      required: [mean_delta, improved_count, regressed_count, unchanged_count]
      properties:
        mean_delta: { type: number }
        improved_count: { type: integer }
        regressed_count: { type: integer }
        unchanged_count: { type: integer }

    DiffItem:
      type: object
      required: [trace_id, delta]
      properties:
        trace_id: { type: string, format: uuid }
        label: { type: string }
        baseline_score: { type: number, nullable: true }
        run_score: { type: number, nullable: true }
        delta: { type: number }
        baseline_rationale: { type: string }
        run_rationale: { type: string }

    # ── CI Gate ────────────────────────────────────────────────────────────────

    CIGateRequest:
      type: object
      required: [dataset_id, run_id, policy]
      properties:
        dataset_id: { type: string, format: uuid }
        run_id: { type: string, format: uuid }
        baseline_run_id: { type: string, format: uuid, nullable: true }
        policy:
          $ref: "#/components/schemas/CIPolicy"

    CIPolicy:
      type: object
      required: [on_fail]
      properties:
        score_floor: { type: number, nullable: true }
        delta_tolerance: { type: number, nullable: true }
        on_fail:
          type: string
          enum: [warn, block]

    CIGateResponse:
      type: object
      required: [decision, mean_score, run_url, reason]
      properties:
        decision:
          type: string
          enum: [pass, warn, block]
        mean_score: { type: number }
        mean_delta: { type: number, nullable: true }
        run_url: { type: string }
        reason: { type: string }

    # ── Billing ────────────────────────────────────────────────────────────────

    BillingCheckoutRequest:
      type: object
      required: [plan, success_url, cancel_url]
      properties:
        plan:
          type: string
          enum: [pro, team]
          description: Target paid plan. Starter is not accepted.
        success_url:
          type: string
          format: uri
          description: Redirect target on successful checkout completion.
        cancel_url:
          type: string
          format: uri
          description: Redirect target if the user abandons checkout.

    BillingCheckoutResponse:
      type: object
      required: [url]
      properties:
        url:
          type: string
          description: Stripe-hosted checkout session URL.

    BillingPortalRequest:
      type: object
      required: [return_url]
      properties:
        return_url:
          type: string
          format: uri
          description: Redirect target after the user exits the portal.

    BillingPortalResponse:
      type: object
      required: [url]
      properties:
        url:
          type: string
          description: Stripe-hosted billing portal session URL.

    BillingInvoice:
      type: object
      required:
        - id
        - number
        - amount_due
        - currency
        - status
        - period_start
        - period_end
        - invoice_pdf
        - hosted_invoice_url
      properties:
        id:
          type: string
          description: Stripe invoice ID.
        number:
          type: string
          description: Human-readable invoice number (e.g. TL-0001).
        amount_due:
          type: integer
          format: int64
          description: Amount due in the smallest currency unit (e.g. cents for USD).
        currency:
          type: string
          description: ISO-4217 currency code in lowercase.
        status:
          type: string
          description: |
            Stripe invoice status. One of: draft, open, paid, void,
            uncollectible.
        period_start:
          type: integer
          format: int64
          description: Unix timestamp (seconds) for the billing period start.
        period_end:
          type: integer
          format: int64
          description: Unix timestamp (seconds) for the billing period end.
        invoice_pdf:
          type: string
          description: |
            URL to the PDF rendering of the invoice. Empty for
            draft/non-finalized invoices.
        hosted_invoice_url:
          type: string
          description: |
            URL to the Stripe-hosted invoice page. Empty for
            draft/non-finalized invoices.

    BillingInvoicesResponse:
      type: object
      required: [invoices]
      properties:
        invoices:
          type: array
          items:
            $ref: "#/components/schemas/BillingInvoice"

    # ── Failure Clusters ────────────────────────────────────────────────────────

    FailureCluster:
      type: object
      required: [error_message, count, first_seen, last_seen, sample_ids]
      properties:
        error_message: { type: string }
        count: { type: integer, format: int64 }
        first_seen: { type: string, format: date-time }
        last_seen: { type: string, format: date-time }
        sample_ids:
          type: array
          items: { type: string, format: uuid }

    FailureClustersResponse:
      type: object
      required: [clusters]
      properties:
        clusters:
          type: array
          items: { $ref: "#/components/schemas/FailureCluster" }
