  /v1/projects:
    get:
      operationId: listProjects
      tags: [projects]
      summary: List projects for the authenticated tenant
      description: |
        Reachable via **Clerk session auth** (dashboard) and via **API key
        auth** carrying the `query` scope (MCP server, SDK clients). Only
        returns projects that belong to the caller's tenant — tenant
        isolation is enforced server-side.

        When `cursor` or `limit` is supplied the response is a single
        keyset-paginated page with `next_cursor` and `has_more`. When
        neither is supplied the response is the full list with no
        pagination fields, preserving the dashboard contract.
      parameters:
        - name: include_archived
          in: query
          schema: { type: boolean, default: false }
        - name: cursor
          in: query
          description: Opaque cursor from a prior `next_cursor`. Omit for the first page.
          schema: { type: string }
        - name: limit
          in: query
          schema: { type: integer, default: 50, minimum: 1, maximum: 200 }
      responses:
        "200":
          description: Project list
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ProjectListResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"

  /v1/projects/{id}:
    patch:
      operationId: patchProject
      tags: [projects]
      summary: Update a project (rename or adjust retention override)
      description: |
        Partial update — supply only the fields you want to change. Current
        supported fields are `name` (human-readable project name; also
        drives the slug) and `retention_days_override` (per-project
        retention window).

        `retention_days_override` must be between 1 and the caller's plan
        retention cap (Starter=30, Pro=90, Team=180, Enterprise=unlimited).
        Set the field to JSON `null` to clear the override and fall back to
        the plan default. Dashboard-only — not reachable via API key.
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: string, format: uuid }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/PatchProjectRequest"
      responses:
        "200":
          description: Project updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Project"
        "400":
          description: |
            Bad request — malformed body or retention override outside the
            plan-allowed range (`error.retention_override_exceeds_plan`).
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
        "409":
          description: Project name already in use in this organization.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

