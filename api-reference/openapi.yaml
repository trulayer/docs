openapi: "3.1.0"
info:
  title: TruLayer API
  version: "0.1.0"
  description: |
    Trace ingestion, evaluation, query, and feedback API for TruLayer AI.

    ### Authentication

    Two auth schemes coexist: SDK API keys (`Authorization: Bearer tl_...`)
    and Clerk session JWTs (dashboard). Routes marked "requires Clerk auth"
    in their summary are unreachable via API key.

    ### Roles (TRU-54)

    Dashboard requests carry one of five organization roles: `owner`,
    `operator`, `member`, `auditor`, `viewer`. Endpoints enforce role
    allowlists, not rank comparisons — `auditor` has access to
    `/v1/audit-log` that `member` does not. See `docs/security.md` for
    the full role-permission matrix.

    - **owner** — full control including billing and member management.
    - **operator** — on-call plane: everything `member` can do plus
      control-loop execution, DLQ resolution, and destructive deletes on
      failure-rules/model-routes/webhooks. No billing, no member
      management.
    - **member** — read + write (ingest, feedback, evals, API keys,
      projects).
    - **auditor** — read-only plus `/v1/audit-log` and `/v1/dlq` access
      for compliance review.
    - **viewer** — read-only dashboard access.

servers:
  - url: https://api.trulayer.ai
    description: Production
  - url: http://localhost:8080
    description: Local development

security:
  - BearerAuth: []

tags:
  - name: health
  - name: ingest
  - name: traces
  - name: metrics
  - name: feedback
  - name: evals
  - name: eval-rules
  - name: control
  - name: apikeys
  - name: model-routes
  - name: datasets
  - name: search
  - name: anomaly
  - name: webhooks
  - name: failure-rules
  - name: eval-runs
  - name: ci
  - name: otlp
  - name: billing
  - name: deprecations
  - name: audit
  - name: failures
  - name: projects
  - name: compliance
  - name: dsr
  - name: policies

paths:
  /health:
    get:
      operationId: getHealth
      tags: [health]
      security: []
      summary: Liveness check
      responses:
        "200":
          description: Service is healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthResponse"

  /v1/ingest:
    post:
      operationId: ingestTrace
      tags: [ingest]
      summary: Ingest a single trace
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/TraceRequest"
      responses:
        "201":
          description: Trace ingested
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/IngestResponse"
        "200":
          description: Duplicate — already ingested (idempotent)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DuplicateResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "429":
          $ref: "#/components/responses/RateLimited"

  /v1/ingest/batch:
    post:
      operationId: ingestBatch
      tags: [ingest]
      summary: Ingest a batch of traces (max 100)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/BatchRequest"
      responses:
        "201":
          description: Batch ingested
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BatchIngestResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "429":
          $ref: "#/components/responses/RateLimited"

  /v1/otlp/traces:
    post:
      operationId: otlpIngestTraces
      tags: [otlp, ingest]
      summary: OTLP/HTTP ingest endpoint (OTel GenAI semconv v1.29.0)
      description: |
        Accepts an OpenTelemetry `ExportTraceServiceRequest` payload, either as
        protobuf (`application/x-protobuf`) or JSON (`application/json`). Maps
        OTel GenAI semantic convention attributes onto TruLayer's span model
        and routes each span through the standard ingestion pipeline
        (Kafka → processor → TimescaleDB).

        Point your OTel Collector's `otlphttp` exporter at this URL to
        dual-ship traces to TruLayer without a second SDK.
      requestBody:
        required: true
        content:
          application/x-protobuf:
            schema:
              type: string
              format: binary
          application/json:
            schema:
              $ref: "#/components/schemas/OTLPExportTraceServiceRequest"
      responses:
        "200":
          description: OTLP `ExportTraceServiceResponse`. `partial_success` is populated iff one or more spans failed to persist.
          content:
            application/x-protobuf:
              schema:
                type: string
                format: binary
            application/json:
              schema:
                $ref: "#/components/schemas/OTLPExportTraceServiceResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "413":
          description: Request body exceeds 20 MiB
        "415":
          description: Unsupported Content-Type (must be application/x-protobuf or application/json)
        "429":
          $ref: "#/components/responses/RateLimited"

  /v1/otlp/export:
    get:
      operationId: otlpExportTraces
      tags: [otlp, traces]
      summary: Export traces in OTLP/HTTP JSON format
      description: |
        Streams traces in OTLP `TracesData` JSON format so existing OTel
        tooling (Datadog, Honeycomb, Tempo, Jaeger) can ingest without a
        TruLayer-specific adapter. Dashboard-only (Clerk session auth).
        Capped at 10,000 spans per response; use the `cursor` query parameter
        returned in the `X-Next-Cursor` response header to paginate.
      parameters:
        - name: from
          in: query
          required: true
          schema: { type: string, format: date-time }
        - name: to
          in: query
          required: true
          schema: { type: string, format: date-time }
        - name: project_id
          in: query
          schema: { type: string, format: uuid }
        - name: cursor
          in: query
          schema: { type: string }
      responses:
        "200":
          description: OTLP `TracesData` payload (JSON-encoded protobuf).
          headers:
            X-Next-Cursor:
              description: Opaque cursor to fetch the next page, present only when more results are available.
              schema: { type: string }
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OTLPTracesData"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"

  /v1/traces:
    get:
      operationId: listTraces
      tags: [traces]
      summary: List traces with cursor-based pagination
      parameters:
        - name: project_id
          in: query
          schema: { type: string, format: uuid }
        - name: model
          in: query
          schema: { type: string }
        - name: error
          in: query
          schema: { type: boolean }
        - name: failure_type
          in: query
          description: Filter traces with spans matching this failure type (e.g. timeout, rate_limit, invalid_response, context_length)
          schema:
            type: string
            enum: [timeout, rate_limit, invalid_response, context_length]
        - name: from
          in: query
          schema: { type: string, format: date-time }
        - name: to
          in: query
          schema: { type: string, format: date-time }
        - name: cursor
          in: query
          schema: { type: string }
        - name: limit
          in: query
          schema: { type: integer, default: 50, minimum: 1, maximum: 200 }
      responses:
        "200":
          description: Trace list
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TraceListResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"

  /v1/traces/{id}:
    get:
      operationId: getTrace
      tags: [traces]
      summary: Get trace detail with spans and events
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: string, format: uuid }
      responses:
        "200":
          description: Trace detail
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Trace"
        "404":
          $ref: "#/components/responses/NotFound"
        "401":
          $ref: "#/components/responses/Unauthorized"

  /v1/deprecations:
    get:
      operationId: listDeprecations
      tags: [deprecations]
      summary: List currently deprecated v1 fields and endpoints
      description: |
        Machine-readable index of fields and endpoints under `/v1` that have
        been marked deprecated and are scheduled for removal. Empty array
        means no deprecations are active.

        See `docs/api-versioning.md` for the full policy. SDKs consume this
        endpoint to emit build-time warnings; integrators consume it to audit
        their exposure without scraping `Deprecation`/`Sunset` response
        headers across every call site.
      responses:
        "200":
          description: Deprecation list (possibly empty)
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Deprecation"
        "401":
          $ref: "#/components/responses/Unauthorized"

  /v1/metrics:
    get:
      operationId: getMetrics
      tags: [metrics]
      summary: Aggregate metrics (error rate, latency percentiles, cost)
      parameters:
        - name: project_id
          in: query
          schema: { type: string, format: uuid }
        - name: from
          in: query
          schema: { type: string, format: date-time }
          description: Defaults to 24h ago
        - name: to
          in: query
          schema: { type: string, format: date-time }
          description: Defaults to now
      responses:
        "200":
          description: Metrics summary
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MetricsResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"

  /v1/audit/verify:
    get:
      operationId: verifyAuditAnchor
      tags: [audit]
      security: []
      summary: Verify a daily audit-log head-hash anchor (TRU-163)
      description: |
        Returns the recorded daily head-hash checkpoint for
        `(tenant_id, date)` as written by the anchoring job. The
        manifest itself is stored in S3 Object Lock (WORM) and is
        signed with an Ed25519 key; this endpoint returns the mirror
        stored in Postgres. Third-party auditors can cross-check the
        `head_hash` against the signed S3 manifest (verifying the
        signature locally) and, optionally, supply their own
        `expected_head_hash` to get an immediate boolean match.

        Unauthenticated by design — the anchors are public evidence.
      parameters:
        - name: tenant_id
          in: query
          required: true
          schema: { type: string, format: uuid }
        - name: date
          in: query
          required: true
          schema: { type: string, format: date }
          description: UTC day, YYYY-MM-DD.
        - name: expected_head_hash
          in: query
          required: false
          schema: { type: string }
          description: Optional. When provided, the response includes `hash_matches`.
      responses:
        "200":
          description: Anchor found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuditVerifyResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "404":
          description: No anchor recorded for the given (tenant_id, date)

  /v1/subprocessors:
    get:
      operationId: listSubprocessors
      tags: [compliance]
      security: []
      summary: Public sub-processor registry (TRU-52)
      description: |
        Returns TruLayer's current list of sub-processors as required
        by GDPR Art. 28(2). Public — no authentication. Content is
        negotiated via the `Accept` header:

          - `application/rss+xml` (or `text/xml`/`application/xml`) →
            RSS 2.0 feed including active sub-processors plus those
            retired within the last 90 days.
          - default / `application/json` → JSON envelope of active
            sub-processors only.
      responses:
        "200":
          description: Sub-processor list
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SubprocessorList"
            application/rss+xml:
              schema:
                type: string
                description: RSS 2.0 feed of sub-processor changes.

  /v1/subprocessors/subscribe:
    post:
      operationId: subscribeSubprocessorChanges
      tags: [compliance]
      security: []
      summary: Subscribe an email to sub-processor change notifications (TRU-52)
      description: |
        Customer DPOs subscribe their email to receive 30-day advance
        notice when a sub-processor is added or changed. Idempotent —
        a 200 response does not reveal whether the address was
        already subscribed.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SubscribeRequest"
      responses:
        "200":
          description: Subscribed (or already subscribed)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SubprocessorSubscribeResponse"
        "400":
          $ref: "#/components/responses/BadRequest"

  /v1/subprocessors/unsubscribe:
    post:
      operationId: unsubscribeSubprocessorChanges
      tags: [compliance]
      security: []
      summary: Unsubscribe an email from sub-processor change notifications (TRU-52)
      description: |
        Idempotent — always returns 200 even when the email was never
        subscribed, so the endpoint cannot be used to enumerate
        subscribers.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SubscribeRequest"
      responses:
        "200":
          description: Unsubscribed (or no-op)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SubprocessorSubscribeResponse"

  /v1/dsr:
    post:
      operationId: createDsrRequest
      tags: [dsr]
      summary: Submit a Data Subject Request (TRU-57)
      description: |
        Self-serve GDPR/CCPA intake. Creates a pending DSR row that a
        background worker fulfils asynchronously. Dashboard-only — the
        route requires a Clerk session and the `owner` or `member`
        role. API keys cannot reach this endpoint.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateDsrRequest"
      responses:
        "201":
          description: DSR request accepted in pending state
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DsrRequest"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          description: Caller lacks the required role (owner or member)
    get:
      operationId: listDsrRequests
      tags: [dsr]
      summary: List Data Subject Requests for the authenticated tenant (TRU-57)
      description: |
        Returns DSR requests newest-first with opaque cursor pagination.
        Dashboard-only.
      parameters:
        - name: cursor
          in: query
          description: Opaque cursor from a previous response's `next_cursor`.
          schema: { type: string }
        - name: limit
          in: query
          description: Page size (1–200, default 50).
          schema:
            type: integer
            minimum: 1
            maximum: 200
            default: 50
      responses:
        "200":
          description: Page of DSR requests
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DsrRequestList"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"

  /v1/dsr/{id}:
    get:
      operationId: getDsrRequest
      tags: [dsr]
      summary: Fetch a single DSR request (TRU-57)
      description: Dashboard-only. Returns 404 when the row is not in the caller's tenant.
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: string, format: uuid }
      responses:
        "200":
          description: DSR request
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DsrRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          description: DSR request not found in this tenant

  /v1/policies:
    post:
      operationId: createPolicy
      tags: [policies]
      summary: Create a Control Loop Policy (TRU-67 Phase 1)
      description: |
        Creates a named YAML-DSL policy in `draft` status. Dashboard-only
        (Clerk session + member role required). Phase 2 (follow-up
        issue) adds the automated evaluator that applies active policies
        to eval events; Phase 1 is CRUD only.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreatePolicyRequest"
      responses:
        "201":
          description: Policy created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Policy"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          description: Caller lacks the required role (owner, operator, or member)
    get:
      operationId: listPolicies
      tags: [policies]
      summary: List Control Loop Policies (TRU-67 Phase 1)
      description: Dashboard-only. Supports optional status filter + pagination.
      parameters:
        - name: status
          in: query
          description: Filter by lifecycle status.
          schema:
            type: string
            enum: [draft, active, paused, archived]
        - name: limit
          in: query
          description: Page size (1–200, default 50).
          schema:
            type: integer
            minimum: 1
            maximum: 200
            default: 50
        - name: offset
          in: query
          description: Offset into the result set (default 0).
          schema:
            type: integer
            minimum: 0
            default: 0
      responses:
        "200":
          description: Page of policies
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PolicyListResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"

  /v1/policies/{id}:
    get:
      operationId: getPolicy
      tags: [policies]
      summary: Fetch a single policy (TRU-67 Phase 1)
      description: Dashboard-only. Returns 404 when the row is not in the caller's tenant.
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: string, format: uuid }
      responses:
        "200":
          description: Policy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Policy"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          description: Policy not found in this tenant
    patch:
      operationId: updatePolicy
      tags: [policies]
      summary: Update a policy (TRU-67 Phase 1)
      description: PATCH semantics. Dashboard-only. Requires member+.
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: string, format: uuid }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdatePolicyRequest"
      responses:
        "200":
          description: Updated policy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Policy"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          description: Caller lacks the required role
        "404":
          description: Policy not found in this tenant
    delete:
      operationId: archivePolicy
      tags: [policies]
      summary: Archive a policy (TRU-67 Phase 1)
      description: |
        Soft-delete — sets status=archived. Owner-only. Phase 2
        control_actions rows link back to policies so we never hard
        delete.
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: string, format: uuid }
      responses:
        "204":
          description: Policy archived
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          description: Caller lacks owner role
        "404":
          description: Policy not found in this tenant

  /v1/ingestion-health:
    get:
      operationId: getIngestionHealth
      tags: [metrics]
      summary: Customer-facing ingestion pipeline health (TRU-167)
      description: |
        Returns ingest reliability signals (success/error rate, top error
        categories, DLQ depth, ingest lag percentiles, last-span timestamp,
        redaction match count) scoped to the authenticated tenant so
        customers can self-diagnose pipeline issues.
      parameters:
        - name: project_id
          in: query
          description: Filter to a single project. Omit for all projects in the tenant.
          schema: { type: string, format: uuid }
        - name: window
          in: query
          description: Rolling time window. Defaults to `24h`.
          schema:
            type: string
            enum: [1h, 24h, 7d]
            default: 24h
      responses:
        "200":
          description: Ingestion-health report
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/IngestionHealthResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"

  /v1/feedback:
    post:
      operationId: submitFeedback
      tags: [feedback]
      summary: Submit user feedback on a trace
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/FeedbackRequest"
      responses:
        "201":
          description: Feedback recorded
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"

  /v1/failures/clusters:
    get:
      operationId: getFailureClusters
      tags: [failures]
      summary: Group error traces by message prefix and return failure clusters
      description: |
        Groups traces that have `error=true` by their top-level error message prefix,
        returning a ranked list of failure clusters with count, first/last seen timestamps,
        and a sample of trace IDs from each cluster. Used by the dashboard Failure clustering view.
      parameters:
        - name: project_id
          in: query
          schema: { type: string, format: uuid }
        - name: from
          in: query
          schema: { type: string, format: date-time }
        - name: to
          in: query
          schema: { type: string, format: date-time }
      responses:
        "200":
          description: Failure clusters
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/FailureClustersResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"

  /v1/eval:
    post:
      operationId: triggerEval
      tags: [evals]
      summary: Trigger an evaluation run
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/EvalTriggerRequest"
      responses:
        "202":
          description: Eval queued
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/EvalTriggerResponse"
        "404":
          $ref: "#/components/responses/NotFound"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "429":
          description: |
            Monthly eval quota exceeded. Returned for starter-plan tenants
            that have hit their `EvalsPerMonth` cap. Pro/Team tenants are
            never hard-blocked here — their overage is metered and billed.
            Clients should distinguish this from generic rate-limiting via
            the `code` field (`eval_quota_exceeded`).
          content:
            application/json:
              schema:
                type: object
                required: [code, error]
                properties:
                  code:
                    type: string
                    enum: [eval_quota_exceeded]
                  error:
                    type: string
    get:
      operationId: listEvals
      tags: [evals]
      summary: List evaluations
      parameters:
        - name: trace_id
          in: query
          schema: { type: string, format: uuid }
        - name: limit
          in: query
          schema: { type: integer, default: 50 }
      responses:
        "200":
          description: Eval list
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/EvalListResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"

  /v1/eval/{id}:
    get:
      operationId: getEval
      tags: [evals]
      summary: Get evaluation result
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: string, format: uuid }
      responses:
        "200":
          description: Evaluation
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Evaluation"
        "404":
          $ref: "#/components/responses/NotFound"
        "401":
          $ref: "#/components/responses/Unauthorized"

  /v1/eval/trends:
    get:
      operationId: getEvalTrends
      tags: [evals]
      summary: Get time-bucketed eval score averages per metric
      parameters:
        - name: project_id
          in: query
          required: true
          schema: { type: string, format: uuid }
        - name: metric
          in: query
          schema: { type: string }
          description: Filter by a single metric name
        - name: from
          in: query
          schema: { type: string, format: date-time }
          description: Start of time range (default last 7 days)
        - name: to
          in: query
          schema: { type: string, format: date-time }
          description: End of time range (default now)
        - name: bucket
